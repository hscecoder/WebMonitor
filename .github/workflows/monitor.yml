name: Monitor Website Health

on:
  workflow_dispatch:
    inputs:
      send_test_alert:
        description: "Send a test Slack alert before checks"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: monitor-health
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate alert secret presence
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$ALERT_WEBHOOK_URL" ]; then
            echo "ALERT_WEBHOOK_URL is missing in repository secrets."
          else
            echo "ALERT_WEBHOOK_URL is configured."
          fi

      - name: Send manual test alert
        if: github.event_name == 'workflow_dispatch' && inputs.send_test_alert == true
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          python -c "import json, os, urllib.request; u=os.getenv('ALERT_WEBHOOK_URL'); d=json.dumps({'text':'TEST ALERT from GitHub Actions monitor workflow'}).encode('utf-8'); req=urllib.request.Request(u, data=d, headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=10); print('Test alert sent')"

      - name: Run health check
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
        run: |
          python monitor.py || echo "MONITOR_FAILED=1" >> "$GITHUB_ENV"

      - name: Generate report
        run: python report.py

      - name: Commit logs/report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/uptime_log.csv logs/daily_report.md
          git diff --staged --quiet || git commit -m "chore: update health logs [skip ci]"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: health-monitor-artifacts
          path: |
            logs/uptime_log.csv
            logs/daily_report.md

      - name: Monitoring status summary
        if: env.MONITOR_FAILED == '1'
        run: echo "One or more targets were DOWN. Logged and alerted."
